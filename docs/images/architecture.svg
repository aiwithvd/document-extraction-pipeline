<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" font-family="Segoe UI, Arial, sans-serif">

  <!-- Background -->
  <rect width="960" height="620" fill="#0f1117"/>

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" fill="#e2e8f0" font-size="17" font-weight="bold" letter-spacing="1">Document Extraction Pipeline — System Architecture</text>

  <!-- ── CLIENT ─────────────────────────────────────────── -->
  <rect x="30" y="65" width="130" height="64" rx="8" fill="#1e2a3a" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="95" y="89" text-anchor="middle" fill="#4a90d9" font-size="11" font-weight="bold">Client</text>
  <text x="95" y="106" text-anchor="middle" fill="#94a3b8" font-size="10">HTTP / REST</text>
  <text x="95" y="120" text-anchor="middle" fill="#94a3b8" font-size="10">JWT Bearer</text>

  <!-- CLIENT → API arrow -->
  <line x1="160" y1="97" x2="228" y2="97" stroke="#4a90d9" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- ── FASTAPI ──────────────────────────────────────────── -->
  <rect x="228" y="55" width="200" height="84" rx="8" fill="#1e2a3a" stroke="#4a90d9" stroke-width="2"/>
  <text x="328" y="77" text-anchor="middle" fill="#4a90d9" font-size="12" font-weight="bold">FastAPI  :8000</text>
  <text x="328" y="95" text-anchor="middle" fill="#94a3b8" font-size="10">POST /documents/upload</text>
  <text x="328" y="110" text-anchor="middle" fill="#94a3b8" font-size="10">GET  /documents/result/{id}</text>
  <text x="328" y="125" text-anchor="middle" fill="#94a3b8" font-size="10">POST /auth/register  |  token</text>

  <!-- ── STORAGE ROW ──────────────────────────────────────── -->

  <!-- API → PostgreSQL -->
  <line x1="260" y1="139" x2="130" y2="195" stroke="#a78bfa" stroke-width="1.4" stroke-dasharray="5,3" marker-end="url(#arrowPurple)"/>
  <!-- PostgreSQL -->
  <rect x="30" y="195" width="140" height="64" rx="8" fill="#1e2a3a" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="100" y="218" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="bold">PostgreSQL 16</text>
  <text x="100" y="235" text-anchor="middle" fill="#94a3b8" font-size="10">Jobs · Users</text>
  <text x="100" y="250" text-anchor="middle" fill="#94a3b8" font-size="10">JSONB results</text>

  <!-- API → Redis -->
  <line x1="310" y1="139" x2="310" y2="195" stroke="#f59e0b" stroke-width="1.4" stroke-dasharray="5,3" marker-end="url(#arrowAmber)"/>
  <!-- Redis -->
  <rect x="228" y="195" width="162" height="64" rx="8" fill="#1e2a3a" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="309" y="218" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="bold">Redis 7</text>
  <text x="309" y="235" text-anchor="middle" fill="#94a3b8" font-size="10">Celery broker</text>
  <text x="309" y="250" text-anchor="middle" fill="#94a3b8" font-size="10">Result backend</text>

  <!-- API → MinIO Documents -->
  <line x1="390" y1="139" x2="490" y2="195" stroke="#34d399" stroke-width="1.4" stroke-dasharray="5,3" marker-end="url(#arrowGreen)"/>
  <!-- MinIO Documents -->
  <rect x="420" y="195" width="162" height="64" rx="8" fill="#1e2a3a" stroke="#34d399" stroke-width="1.5"/>
  <text x="501" y="218" text-anchor="middle" fill="#34d399" font-size="11" font-weight="bold">MinIO  :9000</text>
  <text x="501" y="235" text-anchor="middle" fill="#94a3b8" font-size="10">Bucket: documents</text>
  <text x="501" y="250" text-anchor="middle" fill="#94a3b8" font-size="10">PDF · PNG · JPEG · TIFF</text>

  <!-- MinIO Models (new) -->
  <rect x="610" y="195" width="172" height="64" rx="8" fill="#1e2a3a" stroke="#34d399" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="696" y="218" text-anchor="middle" fill="#34d399" font-size="11" font-weight="bold">MinIO  :9000</text>
  <text x="696" y="235" text-anchor="middle" fill="#94a3b8" font-size="10">Bucket: mineru-models</text>
  <text x="696" y="250" text-anchor="middle" fill="#94a3b8" font-size="10">~15 GB model weights</text>

  <!-- ── CELERY WORKER CONTAINER ──────────────────────────── -->
  <rect x="30" y="310" width="752" height="258" rx="10" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="406" y="334" text-anchor="middle" fill="#6b7280" font-size="11" font-weight="bold" letter-spacing="1">CELERY WORKER  (queue: extraction)</text>

  <!-- Step boxes inside worker -->

  <!-- 1. MinerU -->
  <rect x="50" y="348" width="160" height="90" rx="7" fill="#1e2a3a" stroke="#f97316" stroke-width="1.8"/>
  <text x="130" y="370" text-anchor="middle" fill="#f97316" font-size="11" font-weight="bold">① MinerU</text>
  <text x="130" y="388" text-anchor="middle" fill="#94a3b8" font-size="10">vlm-auto-engine</text>
  <text x="130" y="403" text-anchor="middle" fill="#94a3b8" font-size="10">method: auto</text>
  <text x="130" y="418" text-anchor="middle" fill="#94a3b8" font-size="10">lang: auto-detect</text>
  <text x="130" y="430" text-anchor="middle" fill="#64748b" font-size="9">→ Markdown output</text>

  <!-- 2. Text Processing -->
  <rect x="235" y="348" width="160" height="90" rx="7" fill="#1e2a3a" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="315" y="370" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="bold">② Text Processing</text>
  <text x="315" y="388" text-anchor="middle" fill="#94a3b8" font-size="10">clean_markdown()</text>
  <text x="315" y="403" text-anchor="middle" fill="#94a3b8" font-size="10">chunk_text()</text>
  <text x="315" y="418" text-anchor="middle" fill="#94a3b8" font-size="10">Preserves MD tables</text>
  <text x="315" y="430" text-anchor="middle" fill="#64748b" font-size="9">→ cleaned text</text>

  <!-- 3. LLM Extraction -->
  <rect x="420" y="348" width="160" height="90" rx="7" fill="#1e2a3a" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="500" y="370" text-anchor="middle" fill="#4a90d9" font-size="11" font-weight="bold">③ LLM Extraction</text>
  <text x="500" y="388" text-anchor="middle" fill="#94a3b8" font-size="10">OpenAI / Ollama</text>
  <text x="500" y="403" text-anchor="middle" fill="#94a3b8" font-size="10">JSON mode · temp=0</text>
  <text x="500" y="418" text-anchor="middle" fill="#94a3b8" font-size="10">Pydantic validation</text>
  <text x="500" y="430" text-anchor="middle" fill="#64748b" font-size="9">→ structured JSON</text>

  <!-- 4. Save Result -->
  <rect x="605" y="348" width="160" height="90" rx="7" fill="#1e2a3a" stroke="#34d399" stroke-width="1.5"/>
  <text x="685" y="370" text-anchor="middle" fill="#34d399" font-size="11" font-weight="bold">④ Save Result</text>
  <text x="685" y="388" text-anchor="middle" fill="#94a3b8" font-size="10">status = completed</text>
  <text x="685" y="403" text-anchor="middle" fill="#94a3b8" font-size="10">result (JSONB)</text>
  <text x="685" y="418" text-anchor="middle" fill="#94a3b8" font-size="10">confidence_score</text>
  <text x="685" y="430" text-anchor="middle" fill="#64748b" font-size="9">→ PostgreSQL</text>

  <!-- Arrows between steps -->
  <line x1="210" y1="393" x2="233" y2="393" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <line x1="395" y1="393" x2="418" y2="393" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <line x1="580" y1="393" x2="603" y2="393" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- Retry label -->
  <text x="406" y="470" text-anchor="middle" fill="#6b7280" font-size="10">max_retries=3  ·  retry_delay=60s  ·  acks_late=True</text>

  <!-- Model sync note -->
  <rect x="50" y="488" width="712" height="64" rx="6" fill="#0f2027" stroke="#374151" stroke-width="1"/>
  <text x="406" y="508" text-anchor="middle" fill="#6b7280" font-size="10" font-weight="bold">STARTUP SYNC  (entrypoint.sh)</text>
  <text x="406" y="526" text-anchor="middle" fill="#64748b" font-size="10">ensure_models() checks local volume → pulls from MinIO mineru-models bucket if empty → writes ~/magic-pdf.json</text>
  <text x="406" y="542" text-anchor="middle" fill="#64748b" font-size="10">First deployment: run  scripts/init_mineru_models.py  to download from HuggingFace and push to MinIO</text>

  <!-- ── CONNECTING ARROWS (API → Worker via Redis) ───────── -->
  <line x1="309" y1="259" x2="309" y2="308" stroke="#f59e0b" stroke-width="1.4" stroke-dasharray="5,3" marker-end="url(#arrowAmber)"/>
  <text x="320" y="287" fill="#f59e0b" font-size="9">dispatch task</text>

  <!-- MinIO Models → Worker (model sync) -->
  <line x1="696" y1="259" x2="696" y2="340" stroke="#34d399" stroke-width="1.4" stroke-dasharray="4,3" marker-end="url(#arrowGreen)"/>
  <text x="706" y="290" fill="#34d399" font-size="9">pull models</text>
  <text x="706" y="302" fill="#34d399" font-size="9">(startup)</text>

  <!-- MinIO Documents → Worker (download file) -->
  <line x1="501" y1="259" x2="180" y2="346" stroke="#34d399" stroke-width="1.4" stroke-dasharray="4,3" marker-end="url(#arrowGreen)"/>
  <text x="370" y="298" fill="#34d399" font-size="9">download file</text>

  <!-- ── LEGEND ───────────────────────────────────────────── -->
  <rect x="800" y="65" width="148" height="206" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="874" y="86" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="bold">Legend</text>

  <rect x="816" y="100" width="12" height="12" rx="2" fill="#1e2a3a" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="834" y="111" fill="#94a3b8" font-size="10">API layer</text>

  <rect x="816" y="122" width="12" height="12" rx="2" fill="#1e2a3a" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="834" y="133" fill="#94a3b8" font-size="10">Database / state</text>

  <rect x="816" y="144" width="12" height="12" rx="2" fill="#1e2a3a" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="834" y="155" fill="#94a3b8" font-size="10">Queue / cache</text>

  <rect x="816" y="166" width="12" height="12" rx="2" fill="#1e2a3a" stroke="#34d399" stroke-width="1.5"/>
  <text x="834" y="177" fill="#94a3b8" font-size="10">Object storage</text>

  <rect x="816" y="188" width="12" height="12" rx="2" fill="#1e2a3a" stroke="#f97316" stroke-width="1.5"/>
  <text x="834" y="199" fill="#94a3b8" font-size="10">MinerU extraction</text>

  <line x1="816" y1="216" x2="828" y2="216" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="834" y="220" fill="#94a3b8" font-size="10">Async / event</text>

  <line x1="816" y1="236" x2="828" y2="236" stroke="#34d399" stroke-width="1.4" stroke-dasharray="4,3"/>
  <text x="834" y="240" fill="#94a3b8" font-size="10">Model sync</text>

  <!-- New badge for MinIO Models -->
  <rect x="618" y="164" width="36" height="16" rx="4" fill="#064e3b"/>
  <text x="636" y="176" text-anchor="middle" fill="#34d399" font-size="9" font-weight="bold">NEW</text>

  <!-- ── ARROW MARKERS ───────────────────────────────────── -->
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4a90d9"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#a78bfa"/>
    </marker>
    <marker id="arrowAmber" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f59e0b"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#34d399"/>
    </marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
    </marker>
  </defs>

</svg>
