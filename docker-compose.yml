version: "3.9"

x-app-env: &app-env
  env_file: .env
  environment:
    DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-docuser}:${POSTGRES_PASSWORD:-docpassword}@postgres:5432/${POSTGRES_DB:-docextract}
    SYNC_DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-docuser}:${POSTGRES_PASSWORD:-docpassword}@postgres:5432/${POSTGRES_DB:-docextract}
    REDIS_URL: redis://redis:6379/0
    CELERY_BROKER_URL: redis://redis:6379/0
    CELERY_RESULT_BACKEND: redis://redis:6379/0
    MINIO_ENDPOINT: minio:9000

services:
  # ── FastAPI ────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    ports:
      - "8000:8000"
    <<: *app-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ── Celery Worker ─────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: docker/worker/Dockerfile
    <<: *app-env
    environment:
      MINERU_MODELS_DIR: /app/models/mineru
      MINERU_MODELS_BUCKET: ${MINERU_MODELS_BUCKET:-mineru-models}
      MINERU_DEVICE: ${MINERU_DEVICE:-cuda}
    volumes:
      - mineru_models:/app/models/mineru
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_started
      minio-models-init:
        condition: service_completed_successfully
    restart: unless-stopped
    # Uncomment for GPU workers (requires NVIDIA Container Toolkit):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-docuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-docpassword}
      POSTGRES_DB: ${POSTGRES_DB:-docextract}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-docuser} -d ${POSTGRES_DB:-docextract}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # ── MinIO ─────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  # ── MinIO bucket init ─────────────────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
        sleep 3;
        mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin};
        mc mb local/${MINIO_BUCKET:-documents} --ignore-existing;
        echo 'Bucket ready.';
      "

  # ── MinIO MinerU models bucket init ───────────────────────────────────────
  minio-models-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
        sleep 3;
        mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin};
        mc mb local/${MINERU_MODELS_BUCKET:-mineru-models} --ignore-existing;
        echo 'MinerU models bucket ready.';
      "

volumes:
  postgres_data:
  redis_data:
  minio_data:
  mineru_models:
